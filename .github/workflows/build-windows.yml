name: Build Windows executable

# Builds RadioTop.exe on an actual Windows runner (PyInstaller can't
# cross-compile - a Windows .exe has to be built on Windows).
#
# - Runs automatically whenever the app code, icon, or build spec change.
# - Can also be run manually from the Actions tab ("Run workflow").
# - When triggered by publishing a GitHub Release, the built .exe is
#   attached to that release automatically.
#
# Either way, the result is downloadable from the workflow run's
# "Artifacts" section (Actions tab -> pick the run -> scroll to
# Artifacts), or from the Release page if it was a release build.

on:
  push:
    branches: [main]
    paths:
      - 'radiotop_gui.py'
      - 'radiotop.spec'
      - 'assets/**'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch: {}
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 pyinstaller

      - name: Build RadioTop.exe
        run: pyinstaller radiotop.spec

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: RadioTop-windows
          path: dist/RadioTop.exe
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RadioTop.exe
