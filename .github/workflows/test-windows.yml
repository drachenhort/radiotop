name: Run tests on Windows

# One-off manual check: runs the pytest suite on an actual Windows runner
# to catch anything platform-specific (QSettings' registry backend instead
# of an INI file, Media Foundation instead of FFmpeg/GStreamer for
# playback) that the usual Linux-only test runs can't see.
#
# Manual only - "Run workflow" from the Actions tab.

on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -v
